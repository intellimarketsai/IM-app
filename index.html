<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliMarkets Lab - Pre-News Market Sentiment Engine</title>
    
    <meta name="description" content="Master Forex, Gold, and Crypto trading with IntelliMarkets Lab. Analyze high-impact economic news events like CPI, FOMC, and NFP before they hit the market using our advanced data engine.">
    <meta name="keywords" content="IntelliMarkets Lab, intellimarkets, pre-news trading, forex news sentiment, CPI gold prediction, FOMC market effect, high impact news filter, trading data engine, market sentiment analysis">
    <meta name="author" content="IntelliMarkets Lab">

    <meta property="og:type" content="website">
    <meta property="og:title" content="IntelliMarkets Lab - Pre-News Market Sentiment Engine">
    <meta property="og:description" content="Stop guessing the news impact. Filter high-impact data and get precision pre-news sentiment analysis instantly.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?q=80&w=1200&auto=format&fit=crop">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1e1e2f 0%, #0f0f16 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 10px;
            color: #00ffcc;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 12px;
            color: #00ffcc;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #00ffcc;
            border: none;
            border-radius: 8px;
            color: #0f0f16;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #00ccaa;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }

        .toggle-text {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
        }

        .link-span {
            color: #00ffcc;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: underline;
            margin-left: 5px;
        }

        .link-span:hover {
            color: #00ccaa;
        }

        .hidden-block {
            display: none !important;
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <h1 style="display:none;">IntelliMarkets Lab - Best Pre-News Trading Sentiment Engine</h1>

    <div class="container">
        <div class="logo">IntelliMarkets Lab</div>
        <div class="subtitle">Pre-News Market Sentiment Engine</div>

        <div id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="Enter your email address">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            <button class="btn" onclick="handleLogin()">Sign In</button>
            <div class="toggle-text">
                New trader? <span class="link-span" onclick="showSignupForm()">Create an Account</span>
            </div>
        </div>

        <div id="signup-form" class="hidden-block">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="signup-email" placeholder="username@example.com">
            </div>
            <div class="form-group">
                <label>Create Password</label>
                <input type="password" id="signup-password" placeholder="Minimum 6 characters">
            </div>
            <button class="btn" onclick="handleSignUp()">Register & Verify</button>
            <div class="toggle-text">
                Already have an account? <span class="link-span" onclick="showLoginForm()">Sign In</span>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://mndqlkeqmkezbudmzqfl.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1uZHFsa2VxbWtlemJ1ZG16cWZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNTcwNzMsImV4cCI6MjA5NjgzMzA3M30.WhBsQCT8fMw-eAUwsthQAMtxOdhDzbZvPSTHgVjy2IQ";
        
        let supabaseClient;
        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log("Supabase Connection Successfully Established.");
        } catch (err) {
            console.error("Initialization Error: " + err.message);
        }

        // View Toggling Controls
        function showSignupForm() {
            document.getElementById('login-form').classList.add('hidden-block');
            document.getElementById('signup-form').classList.remove('hidden-block');
        }

        function showLoginForm() {
            document.getElementById('signup-form').classList.add('hidden-block');
            document.getElementById('login-form').classList.remove('hidden-block');
        }

        // Authentication: Sign Up Process
        async function handleSignUp() {
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;

            if(!email || !password) {
                alert("Please fill in both email and password fields.");
                return;
            }

            if(password.length < 6) {
                alert("Password must be at least 6 characters long.");
                return;
            }

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                });

                if (error) {
                    alert("Registration Error: " + error.message);
                } else {
                    alert("Success! A verification link has been sent to your email. Please check your inbox or spam folder.");
                    showLoginForm();
                }
            } catch (catchErr) {
                alert("System Exception: " + catchErr.message);
            }
        }

        // Authentication: Sign In Process
        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            if(!email || !password) {
                alert("Please enter both your email and password.");
                return;
            }

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) {
                    alert("Login Failed: " + error.message);
                } else {
                    alert("Login Successful! Redirecting to dashboard...");
                    window.location.href = "dashboard.html";
                }
            } catch (catchErr) {
                alert("System Exception: " + catchErr.message);
            }
        }
    </script>
</body>
</html>
