<!DOCTYPE html>
<html lang="en">
<head>
    <!-- ========================================== -->
    <!-- SEO & META TAGS (Google Ranking Ke Liye) -->
    <!-- ========================================== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliMarkets Lab - Pre-News Market Sentiment Engine</title>
    <meta name="description" content="Get ahead of the market. IntelliMarkets Lab analyzes high-impact economic news events (CPI, FOMC, NFP) before they drop, giving traders the ultimate edge.">
    <meta name="keywords" content="IntelliMarkets, trading news analysis, forex news predictor, CPI effect gold, FOMC trading strategy, market sentiment engine">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph Tags (Social Media Link Sharing Ke Liye) -->
    <meta property="og:title" content="IntelliMarkets Lab - Pre-News Sentiment Engine">
    <meta property="og:description" content="Analyze high-impact economic data effects before the market moves. Secure your trader access now.">
    <meta property="og:type" content="website">
    <meta property="og:theme-color" content="#00ffcc">

    <!-- SUPABASE LIBRARY -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1e1e2f 0%, #0f0f16 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 10px;
            color: #00ffcc;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 12px;
            color: #00ffcc;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #00ffcc;
            border: none;
            border-radius: 8px;
            color: #0f0f16;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #00ccaa;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }

        .toggle-text {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
        }

        .toggle-text a {
            color: #00ffcc;
            text-decoration: none;
            cursor: pointer;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <!-- SEO H1 Hidden Tag for Google Crawler (UI par nahi dikhega par SEO ke liye zaroori hai) -->
    <h1 style="display:none;">IntelliMarkets Lab - Best Pre-News Trading Sentiment Engine</h1>

    <div class="container">
        <div class="logo">IntelliMarkets Lab</div>
        <div class="subtitle">Pre-News Market Sentiment Engine</div>

        <!-- LOGIN FORM -->
        <div id="login-form">
            <div class="form-group">
                <label for="login-email">Email Address</label>
                <input type="email" id="login-email" placeholder="enter your email" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            <button class="btn" onclick="handleLogin()">Sign In</button>
            <div class="toggle-text">
                New trader? <a onclick="toggleForms()">Create an Account</a>
            </div>
        </div>

        <!-- SIGN UP FORM -->
        <div id="signup-form" class="hidden">
            <div class="form-group">
                <label for="signup-email">Email Address</label>
                <input type="email" id="signup-email" placeholder="yourname@example.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="signup-password">Create Password</label>
                <input type="password" id="signup-password" placeholder="Minimum 6 characters">
            </div>
            <button class="btn" onclick="handleSignUp()">Register & Verify</button>
            <div class="toggle-text">
                Already have an account? <a onclick="toggleForms()">Sign In</a>
            </div>
        </div>
    </div>

    <script>
        // SUPABASE CONFIGURATION (Keys Injected Successfully)
        const SUPABASE_URL = "https://mndqlkeqmkezbudmzqfl.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1uZHFsa2VxbWtlemJ1ZG16cWZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNTcwNzMsImV4cCI6MjA5NjgzMzA3M30.WhBsQCT8fMw-eAUwsthQAMtxOdhDzbZvPSTHgVjy2IQ";
        
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch (err) {
            console.error("Supabase load failed:", err);
        }

        // Form toggle logic
        function toggleForms() {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('signup-form').classList.toggle('hidden');
        }

        // REAL SIGN UP FUNCTION
        async function handleSignUp() {
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;

            if(!email || !password) {
                alert("Bhai, email aur password dono fill karo!");
                return;
            }

            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
            });

            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("🎉 Registration Successful! Bhai, apna Email Inbox/Spam check karo aur verification link par click karo!");
                toggleForms();
            }
        }

        // REAL LOGIN FUNCTION
        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            if(!email || !password) {
                alert("Bhai, email aur password dono daalo!");
                return;
            }

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                alert("Login Failed: " + error.message);
            } else {
                // Verification successful hone par hi dashboard par bhejega
                window.location.href = "dashboard.html";
            }
        }
    </script>
</body>
</html>
