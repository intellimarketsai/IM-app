        input:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #00ffcc;
            border: none;
            border-radius: 8px;
            color: #0f0f16;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #00ccaa;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }

            margin-top: 20px;
            font-size: 14px;

            background: none;
            border: none;
            color: #00ffcc;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: underline;
            padding: 0;

<body>

    <!-- Hidden H1 for Absolute Google SEO Crawling Weightage -->

            </div>
            <div class="form-group">

            </div>
            <button class="btn" type="button" onclick="handleSignUp()">Register & Verify</button>
            <div class="toggle-text">
                Already have an account? <button class="link-btn" type="button" onclick="toggleForms()">Sign In</button>

    <script>
        const SUPABASE_URL = "https://mndqlkeqmkezbudmzqfl.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1uZHFsa2VxbWtlemJ1ZG16cWZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNTcwNzMsImV4cCI6MjA5NjgzMzA3M30.WhBsQCT8fMw-eAUwsthQAMtxOdhDzbZvPSTHgVjy2IQ";

        try {

            console.log("Supabase Connection Initialized.");

            console.error("Initialization Error: " + err.message);

        // Smooth Form Toggler
        function toggleForms() {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            
            if (loginForm.classList.contains('hidden')) {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
            } else {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
            }
        }

        // SUPABASE REAL SIGN UP FUNCTION WITH AUTO-EMAIL TRIGGER
        async function handleSignUp() {
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;

            if(!email || !password) {
                alert("Fill email & password!");
                return;
            }

            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                });

                if (error) {
                    alert("Supabase Error: " + error.message);
                } else {
                    alert("🎉 Success! Real-time verification link sent. Check your inbox and spam folder!");
                    toggleForms();
                }
            } catch (catchErr) {
                alert("System Error: " + catchErr.message);
            }
        }

        // SUPABASE REAL LOGIN FUNCTION
        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            if(!email || !password) {
                alert("Fill email & passowrd!");
                return;
            }

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) {
                    alert("Login Failed: " + error.message);
                } else {
                    alert("Login Successful! ...");
                    window.location.href = "dashboard.html";
                }
            } catch (catchErr) {
                alert("System Error: " + catchErr.message);
            }
        }
